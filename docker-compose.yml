# glovewort phase-1 compose skeleton
# Spec-first only. Not yet validated for build or runtime.

services:
  ollama-brain:
    # Purpose:
    # - host the primary instruct model
    # - provide internal inference only
    image: ollama/ollama:0.12.3
    container_name: ollama-brain
    restart: unless-stopped
    environment:
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-1}
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS:-1}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-10m}
    volumes:
      - ${OLLAMA_DATA_VOLUME:-ollama_data}:/root/.ollama
    networks:
      - brain_hand_net
    # Phase-1 note:
    # - no docker.sock mount here
    # - no public port exposure required by default

  llm-bridge-api:
    # Purpose:
    # - adapt OpenAI-compatible chat requests to Ollama
    # - enforce API-key auth
    build:
      context: ./deploy/ollama-fastapi/api
    container_name: llm-bridge-api
    restart: unless-stopped
    depends_on:
      - ollama-brain
    environment:
      OLLAMA_URL: http://ollama-brain:${OLLAMA_PORT:-11434}
      DEFAULT_MODEL: ${OLLAMA_MODEL:-qwen2.5-coder:1.5b}
      OLLAMA_TIMEOUT: ${BRIDGE_TIMEOUT_SECONDS:-180}
      BRIDGE_API_KEY: ${BRIDGE_API_KEY}
    networks:
      - brain_hand_net
    # Phase-1 note:
    # - internal-only by default
    # - no docker.sock mount here

  openclaw-gateway:
    # Purpose:
    # - Telegram ingress
    # - OpenClaw 2026.4.2 runtime
    # - action executor / hand layer
    build:
      context: ./openclaw
    container_name: openclaw-gateway
    restart: unless-stopped
    depends_on:
      - llm-bridge-api
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_CONFIG_PATH: ${OPENCLAW_CONFIG_PATH:-/app/openclaw/config/openclaw.config.yaml}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - brain_hand_net
    # Phase-1 note:
    # - docker.sock exists only here
    # - no browser runtime planned

networks:
  brain_hand_net:
    name: ${BRAIN_HAND_NETWORK:-brain_hand_net}

volumes:
  ollama_data:
    name: ${OLLAMA_DATA_VOLUME:-ollama_data}
