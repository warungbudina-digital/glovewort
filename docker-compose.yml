services:
  ollama-brain:
    image: ollama/ollama:0.12.3
    container_name: ollama-brain
    restart: unless-stopped
    environment:
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-1}
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS:-1}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-10m}
    volumes:
      - ${OLLAMA_DATA_VOLUME:-ollama_data}:/root/.ollama
    networks:
      - brain_hand_net
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  llm-bridge-api:
    build:
      context: .
      dockerfile: deploy/ollama-fastapi/api/Dockerfile
    container_name: llm-bridge-api
    restart: unless-stopped
    depends_on:
      ollama-brain:
        condition: service_healthy
    environment:
      OLLAMA_URL: http://ollama-brain:${OLLAMA_PORT:-11434}
      DEFAULT_MODEL: ${OLLAMA_MODEL:-qwen2.5-coder:1.5b}
      OLLAMA_TIMEOUT: ${BRIDGE_TIMEOUT_SECONDS:-180}
      BRIDGE_API_KEY: ${BRIDGE_API_KEY}
    networks:
      - brain_hand_net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8000/healthz >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  openclaw-gateway:
    build:
      context: .
      dockerfile: openclaw/Dockerfile
      args:
        OPENCLAW_BASE_IMAGE: ${OPENCLAW_BASE_IMAGE}
    container_name: openclaw-gateway
    restart: unless-stopped
    depends_on:
      llm-bridge-api:
        condition: service_healthy
    environment:
      HOME: /home/node
      TERM: xterm-256color
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_BOT_MODE: ${TELEGRAM_BOT_MODE:-polling}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_CONFIG_PATH: ${OPENCLAW_CONFIG_PATH:-/home/node/.openclaw/openclaw.config.yaml}
      OPENCLAW_GATEWAY_BIND: ${OPENCLAW_GATEWAY_BIND:-lan}
      OPENCLAW_GATEWAY_PORT: ${OPENCLAW_GATEWAY_PORT:-18789}
      BRIDGE_API_KEY: ${BRIDGE_API_KEY}
      BRIDGE_BASE_URL: ${BRIDGE_BASE_URL:-http://llm-bridge-api:8000/v1}
    volumes:
      - ./openclaw/config/openclaw.config.yaml:/home/node/.openclaw/openclaw.config.yaml:ro
      - ./logs:/tmp/openclaw
      - ./state:/home/node/.openclaw/state
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - brain_hand_net
    healthcheck:
      test: ["CMD-SHELL", "/app/openclaw/scripts/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

networks:
  brain_hand_net:
    name: ${BRAIN_HAND_NETWORK:-brain_hand_net}

volumes:
  ollama_data:
    name: ${OLLAMA_DATA_VOLUME:-ollama_data}
