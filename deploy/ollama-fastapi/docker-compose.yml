services:
  ollama-brain:
    image: ollama/ollama:0.12.3
    restart: unless-stopped
    environment:
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-1}
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS:-1}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-10m}
    volumes:
      - ${OLLAMA_DATA_VOLUME:-ollama_data}:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  llm-bridge-api:
    build:
      context: ./api
    restart: unless-stopped
    depends_on:
      ollama-brain:
        condition: service_healthy
    environment:
      OLLAMA_URL: http://ollama-brain:${OLLAMA_PORT:-11434}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-qwen2.5-coder:1.5b}
      OLLAMA_TIMEOUT: ${OLLAMA_TIMEOUT:-180}
      BRIDGE_API_KEY: ${BRIDGE_API_KEY}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8000/healthz >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  ollama_data:
    name: ${OLLAMA_DATA_VOLUME:-ollama_data}
